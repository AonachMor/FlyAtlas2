<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<title>FlyBrowse Test Page</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
</head>
<body>
<h1>Enter gene and locus</h1>
<form action="/FlyBrowse/index.html" method="get">
<p><input type="text" name="locus" size="40"> locus (e.g. chrX:19611525-19615617 or, for mir, chr3R:6809506-6809582)</p>
<p><input type="text" name="id" size="20"> FBgn (e.g. FBgn0016075 or, for mir, FBgn0262424)</p>
<p><input type="text" name="mir" size="20"> "true" for MicroRNA, otherwise "false"</p>
<p><input type="submit" name="submit" value="Go"></p>
</form>
</body>
</html>
