<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<title>FA2Auto Test</title>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<script src="scripts/aComplete.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="scripts/aComplete.css">	
</head>

<body>
<div >
<p>
Select ID Type and then start typing appropriate example.<br>
Autocomplete will kick in at a different stage, depending on ID type.
</p>

<p>
<input type="radio" name="idtype" id="symbol" checked="checked"> Gene Symbol (e.g. vkg)<br>
<input type="radio" name="idtype" id="name"> Gene Name (e.g. viking)<br>
<input type="radio" name="idtype" id="cgnum"> CG id (e.g. CG16858)<br>
<input type="radio" name="idtype" id="fbgn"> FBgn/GeneID (e.g. FBgn0016075)<br>
<input type="radio" name="idtype" id="fbtr"> FBtr/TranscriptID (e.g. FBtr0079036)
</p>

<p>
Gene: <input type="text" autocomplete="off" size="40" id="gene" style="height:15px;" onkeyup="findNames();">
</p>

<!-- start of autocomplete div -->
<div style="position:absolute;" id="popup">
<table id="menuTable" cellspacing="0" cellpadding="0">            
<tbody id="menuTableBody"><tr><td></td></tr></tbody>
</table>
</div><!-- end of autocomplete div -->

</div>

</body>
</html>
